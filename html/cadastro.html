<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="../imagens/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="../css/cadastro.css">
    <title>Tela de Cadastro</title>
</head>
<body>

    <header>
        <div class="container">
        <nav>
            <div class="logo">
                <span><img src="../imagens/logo.png" alt="">SCO | Tela de Cadastro</span>
            </div>

            <ul>
                <li><a href="#" target="_self">Home</a></li>
                <li><a href="../html/cadastro.html" target="_self">Cadastro</a></li>
                <li><a href="#" target="_self">Pesquisa</a></li>
                <li><a href="#" target="_self">Indicadores</a></li>
                <li><a href="#" target="_self">Tutorial</a></li>
                <li><a href="#" target="_self">Sobre nós</a></li>
            </ul>
        </nav>
        </div>
   </header>

    
    <main>
        <section class="formulario">
            <div class="container">
                <p>Liberação para pagamento</p>
        
                <div class="input_grupo">
                    <div class="input_grupo1">
                        <div class="input_fornecedor">
                            <label for="cadastro_fornecedor">Fornecedor: </label>
                            <input id="cadastro_fornecedor" type="text" placeholder="Informe o fornecedor">
                        </div>
                        <br>
                        <div class="input_pedido">
                            <label for="cadastro_pedido">Nº Pedido: </label>
                            <input id="cadastro_pedido" type="number" placeholder="Numeração do pedido">
                        </div>
                        <br>
                        <div class="input_notafiscal">
                            <label for="cadastro_fiscal">Nº Notas Fiscais: </label>
                            <input id="cadastro_fiscal" type="number" placeholder="Numeração da nota fiscal">
                        </div>
                        <br>
                        <div class="input_valor">
                            <label for="cadastro_valor">R$ Notas Fiscais: </label>
                            <input id="cadastro_valor" type="text" placeholder="Formato: R$ x.xxx,xx">
                        </div>
                        <br>
                        <div class="input_data">
                            <label for="cadastro_data">Data do Cadastro: </label>
                            <input id="cadastro_data" type="date">
                        </div>
                    </div>
                </div>
                <br>
                <button type="submit">Cadastrar</button>
            </div>
        </section>
    </main>

    <footer>

    </footer>



    
</body>
</html>
