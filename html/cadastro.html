<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="../imagens/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="../css/cadastro.css">
    <title>Tela de Cadastro</title>
</head>
<body>

    <header>
        <div class="container">
        <nav>
            <div class="logo">
                <span><img src="../imagens/logo.png" alt="">Tela de Cadastro</span>
            </div>

            <ul>
                <li><a href="../html/layout.html" target="_self">Home</a></li>
                <li><a href="../html/cadastro.html" target="_self">Cadastro</a></li>
                <li><a href="../html/pesquisa.html" target="_self">Pesquisa</a></li>
                <li><a href="../html/indicadores.html" target="_self">Indicadores</a></li>
                <li><a href="../html/tutorial.html" target="_self">Tutorial</a></li>
                <li><a href="../html/sobrenos.html" target="_self">Sobre nós</a></li>
            </ul>
        </nav>
        </div>
   </header>

    
    <main>
        <div class="containernovo">

            <h2>Liberação de Pagamento</h2>

            <form action="">

                <div class="grupo">
                    <label for="">Fornecedor: </label>
                    <input type="text" placeholder="Informe o fornecedor">
                </div>

                <div class="linha">
                    <div class="grupo">
                        <label for="">Nº do Pedido: </label>
                        <input type="text" placeholder="Informe o nº pedido">
                    </div>
                </div>

                <div class="grupo">
                    <label for="">Nº da Nota Fiscal: </label>
                    <input type="text" placeholder="Informe o nº nota fiscal">                
                </div>

                <div class="linha">
                    <div class="grupo">
                        <label for="">R$ da Nota Fiscal: </label>
                        <input type="text" placeholder="Informe o R$ nota fiscal">
                    </div>
                </div>

                <div class="grupo">
                    <label for="">Status da Liberação: </label>
                    <select name="" id="">
                        <option value=""></option>
                        <option value="">Em Andamento</option>
                        <option value="">Finalizado</option>
                        <option value="">Informado p/ Pagamento</option>                    
                    </select>
                </div>

                <div class="linha">
                    <div class="grupo">
                        <label for="">Observações: </label>
                        <textarea name="" id="" rows="4"></textarea>
                    </div>
                </div>

                <button type="submit" class="bnt">Salvar Cadastro</button>






            </form>
        </div>
    </main>

    <footer>

    </footer>



    
</body>
</html>
